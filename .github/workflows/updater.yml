name: Update Market Data

on:
  schedule:
    # Every 5 minutes, Monday–Friday
    # 03:00–10:00 UTC ≈ 08:30–15:30 IST
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Generate dashboard data (Twelve Data)
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python runner.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/nifty.json data/nifty_bias.json data/global_meter.json data/nifty_breadth.json
          git commit -m "Update dashboard market data" || echo "No changes to commit"
          git push origin main
