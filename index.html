<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="row top-row">

    <!-- NIFTY LIVE BOX -->
    <div class="box green large" id="niftyLive">
      <div class="nifty-header">
        <span class="status-dot closed" id="niftyStatus"></span>
        <span class="title">NIFTY</span>
      </div>

      <div class="nifty-price" id="niftyPrice">--</div>
      <div class="nifty-change" id="niftyChange">--</div>
      <div class="small" id="niftyTime">Updated: --</div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
