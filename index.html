<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- TOP SECTION -->
  <div class="row top-row">
    
    <!-- ✅ NIFTY LIVE BOX -->
    <div class="box green large" id="niftyLive">
      <div class="nifty-header">
        <span class="status-dot closed" id="niftyStatus"></span>
        <span class="title">NIFTY</span>
      </div>

      <div class="nifty-price" id="niftyPrice">--</div>
      <div class="nifty-change" id="niftyChange">--</div>

      <div class="small" id="niftyTime">Updated: --</div>
    </div>
    <!-- ✅ END -->

    <div class="column flex-1">
      <div class="box green full">BIAS</div>
      <div class="row">
        <div class="box">Gap / Closed By</div>
        <div class="box">Market Open</div>
      </div>
    </div>

    <div class="column">
      <div class="box green">Global Meter</div>
      <div class="box">Nifty Meter</div>
      <div class="box">Trend Probability</div>
    </div>
  </div>

  <!-- ✅ SCRIPT -->
  <script>
    function isMarketLive() {
      const now = new Date();
      const day = now.getDay(); // 0 = Sunday
      const hour = now.getHours();
      const minute = now.getMinutes();

      const isWeekday = day >= 1 && day <= 5;
      const isMarketTime =
        (hour > 9 || (hour === 9 && minute >= 0)) &&
        (hour < 15 || (hour === 15 && minute <= 30));

      return isWeekday && isMarketTime;
    }

    function renderNifty(data) {
      const live = isMarketLive();
      const statusDot = document.getElementById("niftyStatus");

      statusDot.className = "status-dot " + (live ? "live" : "closed");

      document.getElementById("niftyPrice").innerText =
        Number(data.price).toFixed(2);

      const changeEl = document.getElementById("niftyChange");
      const sign = data.change >= 0 ? "+" : "";
      changeEl.innerText =
        sign + data.change + " (" + data.percent + "%)";
      changeEl.className =
        "nifty-change " + (data.change >= 0 ? "positive" : "negative");

      document.getElementById("niftyTime").innerText =
        "Updated: " + new Date().toLocaleTimeString("en-IN", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
    }

    /* ✅ MOCK DATA (Replace with YFinance API later) */
    renderNifty({
      price: 24366.90,
      change: 178.5,
      percent: 0.74
    });

    /* ✅ Auto refresh every 5 min */
    setInterval(() => {
      renderNifty({
        price: 24366.90,
        change: 178.5,
        percent: 0.74
      });
    }, 300000);
  </script>

</body>
</html>
