<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Dashboard</title>

    <!-- Google Font -->
    https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap

    <!-- External CSS -->
    /static/style.css

    <style>
        :root { --gap-before: 12px; --gap-after: 12px; }

        body {
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
            font-family: 'Lato', sans-serif;
            box-sizing: border-box;
        }

        .page-wrapper {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .dashboard-line,
        .secondary-row {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: stretch;
        }

        .box {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
        }

        .sq {
            width: 8px;
            height: 8px;
            display: inline-block;
            border-radius: 50%;
            margin: 0 4px;
        }

        .green { background: #16a34a; }
        .red { background: #dc2626; }
        .grey { background: #9ca3af; }

        .meter {
            width: 100%;
            height: 8px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            transition: width 0.5s ease;
        }

        .flex-row-center {
            display: flex;
            align-items: center;
            width: 100%;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
<div class="page-wrapper">

    <!-- TOP DASHBOARD ROW -->
    <div class="dashboard-line">

        <!-- NIFTY BOX -->
        <div class="box" style="flex:0 0 210px; padding:15px; min-height:160px;">
            <div style="display:flex; flex-direction:column; height:100%; justify-content:space-between;">

                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:14px; font-weight:900; color:#111827;">NIFTY</span>
                    <span id="marketStatus" style="font-size:10px; font-weight:800;">○ LOADING</span>
                </div>

                <div style="margin:10px 0;">
                    <div id="niftyPrice" style="font-size:26px; font-weight:900;">--</div>
                    <div id="niftyChange" style="font-size:12px; font-weight:700; margin-top:4px;">--</div>
                </div>

                <hr style="border:0; border-top:1px solid #f1f5f9; margin:5px 0;">

                <div style="display:flex; justify-content:space-between; font-size:10px;">
                    <div>LOW <span id="niftyLow" style="display:block; font-weight:700;">--</span></div>
                    <div style="text-align:right;">HIGH <span id="niftyHigh" style="display:block; font-weight:700;">--</span></div>
                </div>

                <div id="niftyUpdated"
                     style="font-size:9px; font-style:italic; color:#9ca3af; margin-top:8px;">--</div>
            </div>
        </div>

        <!-- STRUCTURE + METERS -->
        <div style="flex:1.5; display:flex; flex-direction:column; gap:8px;">
            <div class="box" style="padding:12px; display:flex; justify-content:center;">
                <div style="font-size:13px; font-weight:600;">
                    Structural Bias →
                    4H <span id="bias4H" class="sq"></span> /
                    1H <span id="bias1H" class="sq"></span> /
                    15M <span id="bias15M" class="sq"></span>
                    → <span id="biasMessage" style="font-weight:700;">--</span>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- JS -->
/static/app.js
</body>
</html>
