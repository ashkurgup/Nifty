<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-line">
    <div class="box box-nifty">
        <div class="nifty-header">
            <span id="marketSphere" class="sphere grey"></span> [cite: 261, 265]
            <span class="nifty-title">NIFTY</span>
        </div>
        <div id="niftyPrice" class="nifty-price">--</div> [cite: 267, 268]
        <div id="niftyChange" class="nifty-change">--</div> [cite: 269, 271]
        <div class="divider"></div>
        <div id="niftyUpdated" class="small"></div> [cite: 14, 259]
    </div>

    <div class="center-rows">
        <div class="box row-box">
            <div class="bias-line">
                Structural Bias → 
                4H <span id="bias4H" class="sq"></span> 
                / 1H <span id="bias1H" class="sq"></span> 
                / 15M <span id="bias15M" class="sq"></span> 
                → <span id="biasMessage" class="bias-phase"></span> [cite: 80, 90, 125]
            </div>
        </div>

        <div class="box row-box">
            <div class="meter-line">
                <div class="meter"><div id="globalMeterFill" class="meter-fill"></div></div> [cite: 181, 187]
                <span id="globalMeterValue">--</span> | 
                <span id="globalMarkets"></span> [cite: 191, 234]
            </div>
        </div>

        <div class="box row-box">
            <div class="meter-line">
                <div class="meter"><div id="breadthFill" class="meter-fill"></div></div> [cite: 28, 33]
                <span id="breadthMeterValue">--</span> | 
                <span id="breadthSectors"></span> [cite: 37, 45]
            </div>
        </div>
    </div>

    <div class="box box-side">
        <div class="side-title">STRATEGY</div>
        <div class="side-val">Active</div>
        <div class="side-sub">SMC Protocol</div>
    </div>

    <div class="box box-side">
        <div class="side-title">WEALTH 2029</div>
        <div class="side-val">--%</div>
        <div class="side-sub">Debt-Free Goal</div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
