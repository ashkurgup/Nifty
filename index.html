<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market Dashboard</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ================= DASHBOARD ROW ================= -->
  <div class="dashboard-row">

    <!-- NIFTY BOX -->
    <div class="box box-nifty">
      <div class="nifty-header">
        <span id="niftyStatus" class="status-dot closed"></span>
        <span class="nifty-title">NIFTY</span>
      </div>
      <div id="niftyPrice" class="nifty-price">--</div>
      <div id="niftyChange" class="nifty-change">--</div>
      <div id="niftyTime" class="small">Updated: --</div>
    </div>

    <!-- RIGHT COLUMN (BIAS + GLOBAL METER) -->
    <div class="right-column">

      <!-- STRUCTURAL BIAS -->
      <div class="box box-bias">
        <div class="bias-line">
          <strong>Structural Bias</strong> →
          4H <span id="bias4H" class="sq bullish"></span> /
          1H <span id="bias1H" class="sq bullish"></span> /
          15m <span id="bias15M" class="sq pullback"></span>
          → <span id="biasPhase" class="bias-phase">Pullback phase</span>
        </div>
      </div>

      <!-- GLOBAL METER -->
     <!-- ✅ GLOBAL METER WITH METER BAR -->
<div class="box box-global-meter">
  <div class="meter-line">
    <div class="meter">
      <div id="globalMeterFill" class="meter-fill"></div>
    </div>

    <span>|</span>
    <span>DowF 0.04%</span>
    <span>|</span>
    <span>DAX 0.00%</span>
    <span>|</span>
    <span>Nikkei −0.35%</span>
    <span>|</span>
    <span>HSI −0.08%</span>
  </div>
</div>

<!-- ✅ NIFTY BREADTH METER -->
<div class="box box-nifty-breadth">
  <div class="meter-line">
    <div class="meter">
      <div id="niftyBreadthFill" class="meter-fill"></div>
    </div>

    <span>|</span>
    <span>BANK</span>
    <span>|</span>
    <span>FIN</span>
    <span>|</span>
    <span>IT</span>
    <span>|</span>
    <span>METAL</span>
    <span>|</span>
    <span>FMCG</span>
  </div>
</div>


    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
