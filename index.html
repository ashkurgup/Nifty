<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
            font-family: 'Lato', sans-serif;
        }

        /* This wrapper ensures everything stays within the same bounds */
        .page-wrapper {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dashboard-line, .secondary-row {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: stretch;
        }

        .box {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .sq { width: 8px; height: 8px; display: inline-block; border-radius: 50%; margin: 0 4px; }
        .green { background: #16a34a; }
        .red { background: #dc2626; }
        .grey { background: #9ca3af; }
        
        .meter { width: 60px; height: 8px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
        .meter-fill { height: 100%; transition: width 0.5s ease; }
    </style>
</head>
<body>

<div class="page-wrapper">

    <div class="dashboard-line">

        <div class="box box-nifty" style="flex: 0 0 210px; padding: 15px; min-height: 160px;">
            <div style="display: flex; flex-direction: column; height: 100%; justify-content: space-between;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 14px; font-weight: 900; color: #111827;">NIFTY</span>
                    <span id="marketStatus" style="font-size: 10px; font-weight: 800; color: #16a34a;">● LIVE</span>
                </div>
                <div style="margin: 10px 0;">
                    <div id="niftyPrice" style="font-size: 26px; font-weight: 900; color: #111827; line-height: 1;">--</div>
                    <div id="niftyChange" style="font-size: 12px; font-weight: 700; margin-top: 4px;">--</div>
                </div>
                <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 5px 0;">
                <div style="display: flex; justify-content: space-between; font-size: 10px;">
                    <div>LOW <span id="niftyLow" style="display:block; font-weight:700;">--</span></div>
                    <div style="text-align: right;">HIGH <span id="niftyHigh" style="display:block; font-weight:700;">--</span></div>
                </div>
                <div id="niftyUpdated" style="font-size: 9px; font-style: italic; color: #9ca3af; margin-top: 8px;">--</div>
            </div>
        </div>

        <div style="flex: 1.5; display: flex; flex-direction: column; gap: 8px;">
            <div class="box" style="flex: 1; padding: 12px; display: flex; align-items: center; justify-content: center;">
                <div style="font-size: 13px; font-weight: 600;">Structural Bias → 4H <span id="bias4H" class="sq"></span> / 1H <span id="bias1H" class="sq"></span> / 15M <span id="bias15M" class="sq"></span> → <span id="biasMessage" style="font-weight:700;">--</span></div>
            </div>
            <div class="box" style="flex: 1; padding: 10px; display: flex; align-items: center; gap: 10px;">
                <div class="meter"><div id="globalMeterFill" class="meter-fill"></div></div> 
                <span id="globalMeterValue" style="font-weight:800; font-size:12px;">--</span>
                <span style="color: #e2e8f0;">|</span>
                <div id="globalMarkets" style="display: flex; gap: 15px; font-size: 11px;"></div>
            </div>
            <div class="box" style="flex: 1; padding: 10px; display: flex; align-items: center; gap: 10px;">
                <div class="meter"><div id="breadthFill" class="meter-fill"></div></div> 
                <span id="breadthMeterValue" style="font-weight:800; font-size:12px;">--</span>
                <span style="color: #e2e8f0;">|</span>
                <div id="breadthSectors" style="display: flex; gap: 15px; font-size: 11px;"></div>
            </div>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
            <div class="box" style="flex: 0 0 38px; display: flex; align-items: center; justify-content: center; background: #f8fafc;">
                <span style="font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Trading Session Active</span>
            </div>
            <div style="flex: 1; display: flex; gap: 8px;">
                <div class="box" style="flex: 1; padding: 12px;">
                    <div style="font-size: 10px; color: #94a3b8; font-weight: 800;">STRATEGY</div>
                    <div style="font-size: 18px; font-weight: 900; margin: 4px 0;">Active</div>
                    <div id="stratLevels" style="font-size: 11px; font-weight: 700; color: #64748b;">SMC Protocol</div>
                </div>
                <div class="box" style="flex: 1; padding: 12px;">
                    <div style="font-size: 10px; color: #94a3b8; font-weight: 800;">WEALTH 2029</div>
                    <div id="wealthVal" style="font-size: 18px; font-weight: 900; margin: 4px 0;">--%</div>
                    <div style="font-size: 10px; color: #64748b;">Debt-Free Goal</div>
                </div>
            </div>
        </div>

    </div> <div class="secondary-row">
        <div class="box" style="flex: 1; padding: 15px; text-align: center; font-weight: 800;">Metric 1</div>
        <div class="box" style="flex: 1; padding: 15px; text-align: center; font-weight: 800;">Metric 2</div>
        <div class="box" style="flex: 1; padding: 15px; text-align: center; font-weight: 800;">Metric 3</div>
        <div class="box" style="flex: 1; padding: 15px; text-align: center; font-weight: 800;">Metric 4</div>
        <div class="box" style="flex: 1; padding: 15px; text-align: center; font-weight: 800;">Metric 5</div>
    </div>

</div> <script src="app.js"></script>
</body>
</html>
