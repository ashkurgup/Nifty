<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard-line">
    <div class="box box-nifty">
        <div class="nifty-header"><span id="marketSphere" class="sphere grey"></span> <span class="nifty-title">NIFTY</span></div>
        <div id="niftyPrice" class="nifty-price">--</div>
        <div id="niftyChange" class="nifty-change">--</div>
        <div class="divider"></div>
        <div id="niftyUpdated" class="small"></div>
    </div>
    <div class="center-rows">
        <div class="box"><div class="bias-line">Structural Bias → 4H <span id="bias4H" class="sq"></span> / 1H <span id="bias1H" class="sq"></span> / 15M <span id="bias15M" class="sq"></span> → <span id="biasMessage" class="bias-phase"></span></div></div>
        <div class="box"><div class="meter-line"><div class="meter"><div id="globalMeterFill" class="meter-fill"></div></div> <span id="globalMeterValue">--</span> | <span id="globalMarkets"></span></div></div>
        <div class="box"><div class="meter-line"><div class="meter"><div id="breadthFill" class="meter-fill"></div></div> <span id="breadthMeterValue">--</span> | <span id="breadthSectors"></span></div></div>
    </div>
    <div class="box box-side"><div class="side-title">STRATEGY</div><div class="side-val">Active</div><div class="small">SMC Protocol</div></div>
    <div class="box box-side"><div class="side-title">WEALTH 2029</div><div class="side-val">--%</div><div class="small">Debt-Free Goal</div></div>
</div>
    <hr class="faint-divider">

<div class="secondary-row">
    <div class="box">Metric 1</div>
    <div class="box">Metric 2</div>
    <div class="box">Metric 3</div>
    <div class="box">Metric 4</div>
    <div class="box">Metric 5</div>
</div>
<hr class="faint-divider">
<div class="Third-row">
    <div class="box">Metric 1</div>   
    </div>
<hr class="faint-divider">

<div class="main-layout-wrapper">
    
    <div class="zone-horizontal">
        <div class="box">H-Box 1</div>
        <div class="box">H-Box 2</div>
        <div class="box">H-Box 3</div>
        <div class="box">H-Box 4</div>
    </div>

    <div class="vertical-separator"></div>

    <div class="zone-vertical">
        <div class="box">V-Box 1</div>
        <div class="box">V-Box 2</div>
        <div class="box">V-Box 3</div>
    </div>
    
</div>

<hr class="faint-divider">
<script src="app.js"></script>
</body>
</html>
