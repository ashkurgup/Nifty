<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market Dashboard</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ✅ NIFTY BOX -->
  <div class="box large">

    <!-- MARKET STATUS -->
    <div id="niftyStatusText" class="market-status closed">
      CLOSED
    </div>

    <div class="divider"></div>

    <!-- HEADER -->
    <div class="nifty-header">
      <span id="niftyStatus" class="status-dot closed"></span>
      <span class="nifty-title">NIFTY</span>
    </div>

    <!-- PRICE -->
    <div id="niftyPrice" class="nifty-price">--</div>

    <!-- CHANGE -->
    <div id="niftyChange" class="nifty-change">--</div>

    <!-- UPDATED TIME -->
    <div id="niftyTime" class="small">Updated: --</div>

  </div>

  <script src="app.js"></script>
</body>
</html>
