<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market Dashboard</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- =====================================================
       DASHBOARD ROW 1 : NIFTY + STRUCTURAL BIAS
       ===================================================== -->
  <div class="dashboard-row">

    <!-- ✅ BOX 1 : NIFTY PRICE (FROZEN) -->
    <div class="box large">

      <div class="nifty-header">
        <span id="niftyStatus" class="status-dot closed"></span>
        <span class="nifty-title">NIFTY</span>
      </div>

      <div id="niftyPrice" class="nifty-price">--</div>
      <div id="niftyChange" class="nifty-change">--</div>
      <div id="niftyTime" class="small">Updated: --</div>

    </div>

    <!-- ✅ BOX 2 : STRUCTURAL BIAS -->
  <div class="box">

  <div class="bias-line">

    <!-- Title -->
    <span class="bias-title">Bias</span>

    <span class="bias-arrow">→</span>

    <!-- Timeframes -->
    <span class="tf">4H</span>
    <span id="bias4H" class="bias-dot bullish"></span>

    <span>/</span>

    <span class="tf">1H</span>
    <span id="bias1H" class="bias-dot bullish"></span>

    <span>/</span>

    <span class="tf">15m</span>
    <span id="bias15M" class="bias-dot pullback"></span>

    <span class="bias-arrow">→</span>

    <!-- Phase -->
    <span id="biasPhase" class="bias-phase-inline">
      Pullback phase
    </span>

  </div>

</div>

  </div>

  <!-- =====================================================
       DASHBOARD ROW 2 : FUTURE BOXES (DOWN)
       ===================================================== -->
  <div class="dashboard-row">
    <!-- Paste future boxes here -->
  </div>

  <script src="app.js"></script>
</body>
</html>
