<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market Dashboard</title>

  <!-- Fonts -->
  https://fonts.googleapis.com
  https://fonts.gstatic.com
  https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&display=swap

  style.css
</head>

<body>

  <!-- ================= ROW 1 ================= -->
  <div class="dashboard-row">

    <!-- NIFTY BOX (LEFT / SMALLER WIDTH) -->
    <div class="box box-nifty">

      <div class="nifty-header">
        <span id="niftyStatus" class="status-dot closed"></span>
        <span class="nifty-title">NIFTY</span>
      </div>

      <div id="niftyPrice" class="nifty-price">--</div>
      <div id="niftyChange" class="nifty-change">--</div>
      <div id="niftyTime" class="small">Updated: --</div>

    </div>

    <!-- STRUCTURAL BIAS BOX (RIGHT / WIDER) -->
    <div class="box box-bias">

      <div class="bias-line">

        <span class="bias-title">Structural Bias</span>
        <span class="bias-arrow">→</span>

        <span class="tf">4H</span>
        <span id="bias4H" class="bias-dot bullish"></span>

        <span>/</span>

        <span class="tf">1H</span>
        <span id="bias1H" class="bias-dot bullish"></span>

        <span>/</span>

        <span class="tf">15m</span>
        <span id="bias15M" class="bias-dot pullback"></span>

        <span class="bias-arrow">→</span>

        <span id="biasPhase" class="bias-phase-inline">
          Pullback phase
        </span>

      </div>

    </div>

  </div>

  <!-- ================= ROW 2 ================= -->
  <div class="dashboard-row">
    <!-- Future boxes go here (downwards) -->
  </div>

  app.jsscript>
</body>
</html>
