<div class="dashboard-line" style="display: flex; gap: 10px; align-items: stretch; width: 100%;">

    <div class="box box-nifty" style="flex: 0 0 210px; padding: 15px;">
        <div style="display: flex; flex-direction: column; height: 100%; justify-content: space-between;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 16px; font-weight: 900; color: #111827;">NIFTY</span>
                <span id="marketStatus" style="font-size: 10px; font-weight: 800;">● --</span>
            </div>
            <div style="margin: 10px 0;">
                <div id="niftyPrice" style="font-size: 28px; font-weight: 900; color: #111827; line-height: 1;">--</div>
                <div id="niftyChange" style="font-size: 13px; font-weight: 700; margin-top: 4px;">--</div>
            </div>
            <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 5px 0;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-size: 8px; color: #9ca3af; font-weight: 800; text-transform: uppercase;">Low</div>
                    <div id="niftyLow" style="font-size: 11px; font-weight: 700;">--</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 8px; color: #9ca3af; font-weight: 800; text-transform: uppercase;">High</div>
                    <div id="niftyHigh" style="font-size: 11px; font-weight: 700;">--</div>
                </div>
            </div>
            <div id="niftyUpdated" style="font-size: 9px; font-style: italic; color: #9ca3af; margin-top: 8px;">--</div>
        </div>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
        <div class="box" style="flex: 1; padding: 10px; display: flex; align-items: center;">
            <div style="font-size: 13px; font-weight: 600;">Bias: <span id="bias4H" class="sq"></span><span id="bias1H" class="sq"></span><span id="bias15M" class="sq"></span> | <span id="biasMessage">--</span></div>
        </div>
        <div class="box" style="flex: 1; padding: 10px; display: flex; align-items: center; gap: 10px;">
            <div class="meter"><div id="globalMeterFill" class="meter-fill"></div></div>
            <div id="globalMarkets" style="display: flex; overflow: hidden; font-size: 11px;"></div>
        </div>
        <div class="box" style="flex: 1; padding: 10px; display: flex; align-items: center; gap: 10px;">
            <div class="meter"><div id="breadthFill" class="meter-fill"></div></div>
            <div id="breadthSectors" style="display: flex; overflow: hidden; font-size: 11px;"></div>
        </div>
    </div>

    <div class="box" style="flex: 0 0 220px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; gap: 8px;">
        <div style="font-size: 10px; font-weight: 800; color: #9ca3af; text-transform: uppercase;">Key Levels</div>
        <div id="stratLevels" style="font-size: 13px; font-weight: 700; color: #374151; line-height: 1.4;">
            No text like: "Strong resistance, Likely to break"
        </div>
    </div>

    <div class="box box-side" style="flex: 0 0 180px; padding: 15px; display: flex; flex-direction: column; justify-content: center; text-align: center;">
        <div class="side-title">WEALTH 2029</div>
        <div id="wealthVal" style="font-size: 22px; font-weight: 900; margin: 5px 0;">--%</div>
        <div style="font-size: 10px; color: #9ca3af; font-weight: 700;">Project Start time</div>
    </div>

</div>
