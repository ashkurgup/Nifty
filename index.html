<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market Dashboard</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="httpsnk rel="preconnect" href="https://fonts.gstatic.com"oogleapis.com/css2?family=Lato:wght@400;700;800&display=swap" rel="stylesheet TAG -->
  <link rel="stylesheet" href="style.css"dashboard-row">

  <!-- ================= NIFTY ================= -->
  <div class="box box-nifty">
    <div class="nifty-header">
      <span id="marketSphere" class="sphere grey"></span>
      <span class="nifty-title">NIFTY</span>
    </div>

    <div id="niftyPrice" class="nifty-price">--</div>
    <div id="niftyChange" class="nifty-change">--</div>
    <div class="divider"></div>
    <div id="niftyUpdated" class="small"></div>
  </div>

  <!-- ================= RIGHT COLUMN ================= -->
  <div class="right-column">

    <!-- ================= STRUCTURAL BIAS ================= -->
    <div class="box">
      <div class="bias-line">
        Structural Bias →
        4H <span id="bias4H" class="sq"></span>
        / 1H <span id="bias1H" class="sq"></span>
        / 15M <span id="bias15M" class="sq"></span>
        →
        <span id="biasMessage" class="bias-phase"></span>
      </div>
    </div>

    <!-- ================= GLOBAL MARKET ================= -->
    <div class="box">
      <div class="meter-line">
        <div class="meter">
          <div id="globalMeterFill" class="meter-fill"></div>
        </div>
        <span id="globalMeterValue">--</span> |
        <span id="globalMarkets"></span>
      </div>
    </div>

    <!-- ================= NIFTY BREADTH ================= -->
    <div class="box">
      <div class="meter-line">
        <div class="meter">
          <div id="breadthFill" class="meter-fill"></div>
        </div>
        <span id="breadthMeterValue">--</span> |
        <span id="breadthSectors"></span>
      </div>
    </div>

  </div>
</div>

<!-- ✅ SCRIPT MUST BE A SCRIPT TAG -->
app.js</script>
</body>
</html>
